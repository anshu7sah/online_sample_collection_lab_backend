components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /api/auth/rider/login:
    post:
      summary: Rider Login
      description: Login for an approved rider.
      tags:
        - Rider Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: OK (Returns JWT token and profile)
        '403':
          description: Forbidden (Rider is notAPPROVED)
          
  /api/auth/rider/profile:
    patch:
      summary: Edit Rider Profile
      description: Update rider name, phone, and dob.
      tags:
        - Rider Auth
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                phone:
                  type: string
                dob:
                  type: string
                  format: date
      responses:
        '200':
          description: Profile updated
  
  /api/rider/bookings/scheduled:
    get:
      summary: Get Scheduled Bookings
      description: Dashboard view for riders to see available scheduled bookings.
      tags:
        - Rider Bookings
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated scheduled bookings

  /api/rider/bookings/{id}/accept:
    post:
      summary: Accept a Booking
      description: A rider accepts a scheduled booking.
      tags:
        - Rider Bookings
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Booking accepted successfully

  /api/rider/bookings/{id}/collect:
    patch:
      summary: Collect Sample & Cash
      description: Mark the sample as collected. Calculates earnings if cash is collected on PAY_LATER bookings.
      tags:
        - Rider Bookings
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                collectionAmount:
                  type: number
      responses:
        '200':
          description: Sample collected and updated

  /api/rider/bookings/my:
    get:
      summary: Get My Bookings
      description: See all bookings assigned to the logged-in rider.
      tags:
        - Rider Bookings
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Paginated assigned bookings

  /api/rider/bookings/completed:
    get:
      summary: Get Completed Bookings
      description: See the rider's completed bookings.
      tags:
        - Rider Bookings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Paginated completed bookings

  /api/rider/bookings/earnings:
    get:
      summary: Get Rider Earnings
      description: Get wallet balance, total earned, and pending settlement details.
      tags:
        - Rider Bookings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Earnings summary object

  /api/rider/bookings/transfers/request:
    post:
      summary: Request Settlement
      description: Rider requests back-transfer to the company from wallet balance.
      tags:
        - Rider Money Transfers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                notes:
                  type: string
      responses:
        '201':
          description: Transfer request created

  /api/rider/bookings/transfers:
    get:
      summary: Get My Transfer History
      description: View past transfers (Collections and Settlements).
      tags:
        - Rider Money Transfers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of transfers

  /api/admin/riders:
    get:
      summary: List All Riders
      tags:
        - Admin Rider Management
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
      responses:
        '200':
          description: List of riders

  /api/admin/riders/revenue:
    get:
      summary: Get Revenue Graph Data
      tags:
        - Admin Rider Management
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [daily, monthly, yearly]
            default: monthly
        - in: query
          name: riderId
          schema:
            type: integer
      responses:
        '200':
          description: Revenue data graph

  /api/admin/riders/{id}/approve:
    patch:
      summary: Approve Rider
      description: Promotes a Rider to APPROVED and assigns a commission percentage.
      tags:
        - Admin Rider Management
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - commissionPercent
              properties:
                commissionPercent:
                  type: number
      responses:
        '200':
          description: Rider approved

  /api/admin/transfers:
    get:
      summary: List All Transfer Requests
      tags:
        - Admin Money Transfers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of transfers

  /api/admin/transfers/{id}/approve:
    patch:
      summary: Approve Settlement
      description: Approves pending settlement and deducts from Rider's wallet.
      tags:
        - Admin Money Transfers
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Transfer approved

  /api/admin/transfers/{id}/reject:
    patch:
      summary: Reject Settlement
      tags:
        - Admin Money Transfers
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
      responses:
        '200':
          description: Transfer rejected
